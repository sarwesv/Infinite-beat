<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Lo-Fi Beats</title>
    <!-- Version: 1.0.5 - Minimalist LEGO Visualizer -->
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>
    <!-- BACKGROUND LAYER -->
    <div class="visualizer-container">
        <canvas id="visualizer-canvas"></canvas>
    </div>

    <!-- UI LAYER -->
    <div id="app">
        <header>
            <h1>Infinite Lo-Fi</h1>
            <p>Your generative focus companion</p>
        </header>

        <main>
            <div class="controls">
                <button id="start-stop" class="btn-primary">Start Music</button>
                <div class="volume-control">
                    <label for="volume">Volume</label>
                    <input type="range" id="volume" min="-60" max="0" value="-12">
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
