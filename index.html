<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Lo-Fi Beats</title>
    <!-- Version: 1.0.5 - Minimalist LEGO Visualizer -->
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
</head>
<body>
    <!-- BACKGROUND LAYER -->
    <div id="stagger-bg" class="stagger-grid"></div>
    
    <div class="visualizer-container">
        <canvas id="visualizer-canvas"></canvas>
    </div>

    <!-- UI LAYER -->
    <div class="ui-overlay">
        <button id="start-stop" class="btn-minimalist">Start Music</button>
    </div>

    <div class="version-info">
        <span class="v-label">v1.1.2</span>
        <div class="v-tooltip">
            <strong>Latest Update:</strong><br>
            Advanced Generative Engine: Added Jazz chords, Tape Wobble effects, and motif-based melodies for a deeper soundscape.
        </div>
    </div>

    <script src="app.js?v=1.1.2"></script>
</body>
</html>
