<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Lo-Fi Beats</title>
    
    <!-- PWA & iOS Meta Tags -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Infinite Lo-Fi">
    <link rel="apple-touch-icon" href="https://em-content.zobj.net/source/apple/391/headphone_1f3a7.png">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎧</text></svg>">
    <!-- Version: 1.4.5 - PWA Support -->
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.7.77/Tone.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
</head>
<body>
    <!-- BACKGROUND LAYER -->
    <div id="stagger-bg" class="stagger-grid"></div>
    
    <div class="visualizer-container">
        <canvas id="visualizer-canvas"></canvas>
    </div>

    <!-- UI LAYER -->
    <div class="ui-overlay">
        <button id="start-stop" class="btn-zen">START</button>
    </div>

    <script src="app.js?v=1.2.7"></script>
</body>
</html>
